apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: default
  labels:
    app: order
spec:
  clusterIP: None
  selector:
    app: order
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order
  namespace: default
spec:
  serviceName: order
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order-pod
          image: cloud-native-api-gateway-order-1:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
