gateway:
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

observability:
  logging:
    level: info

services:
  - name: catalog-service
    load_balancer: round_robin
    routes:
      - path: /catalog/*
        strip_prefix: true
    upstreams:
      - url: http://localhost:8081
      - url: http://localhost:8083

  - name: order-service
    load_balancer: least_connections
    routes:
      - path: /orders/*
        strip_prefix: true
    upstreams:
      - url: http://localhost:8082
      - url: http://localhost:8084

health_checks:
  enabled: true
  interval: 10s
  timeout: 2s
  path: /healthz
  failure_threshold: 3
  success_threshold: 2

authentication:
  api_key:
    enabled: true
    header: X-API-Key
    keys:
      - key: alice-secret-key
        consumer: alice
      - key: bob-secret-key
        consumer: bob
  jwt:
    enabled: true
    public_key: configs/keys/demo-public.pem