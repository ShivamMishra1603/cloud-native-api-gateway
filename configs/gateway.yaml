gateway:
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

observability:
  logging:
    level: info

services:
  - name: catalog-service
    routes:
      - path: /catalog/*
        strip_prefix: true
    upstreams:
      - url: http://localhost:8081

  - name: order-service
    routes:
      - path: /orders/*
        strip_prefix: true
    upstreams:
      - url: http://localhost:8082